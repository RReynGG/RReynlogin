<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>SƏHV!</title>
    <style>
        /* Qara arxa fon və tam mərkəzləmə */
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Skroll olmasın */
        }

        /* Böyük, qırmızı və hərəkətli yazı */
        .error-text {
            color: #ff0000;
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 8vw; /* Ekranın ölçüsünə görə avtomatik böyüyür */
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
            letter-spacing: 10px;
            
            /* Hərəkət effekti (yanıb-sönmə və titrəmə) */
            animation: blink 0.5s infinite alternate, shake 0.2s infinite;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
        }

        /* Yanıb-sönmə animasiyası */
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }

        /* Titrəmə effekti */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="error-text">
        USERNAME VƏ YA PAROL SƏHVİDİR!
    </div>

</body>
</html>
